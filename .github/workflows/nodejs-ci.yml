# 教科書: Node.js CI（Jest の npm test）
name: Node.js CI

on:
  push:
    branches: [main, feature/practice-sandbox]
    paths:
      - "todo-app/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "todo-app/**"
      - ".github/workflows/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: todo-app

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: todo-app/package-lock.json

      - run: npm ci
      - run: npm test
