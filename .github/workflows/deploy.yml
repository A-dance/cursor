# 教科書: main への push で Vercel に本番デプロイ
# GitHub Secrets: VERCEL_TOKEN（必須）, VERCEL_PROJECT_ID（必須）
# VERCEL_ORG_ID は Team Settings にあるが、--scope で代替可
name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "todo-app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Vercel の Root Directory = todo-app のため、リポジトリ直下から deploy する
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token "$VERCEL_TOKEN" --scope a-dances-projects --yes
